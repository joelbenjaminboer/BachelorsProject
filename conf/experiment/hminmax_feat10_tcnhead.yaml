# @package _global_
# Paper-aligned setup: per-subject height_minmax IMU normalisation, unnormalized
# target (raw degrees), 10 handcrafted IMU features (6 raw + Accel_L2/Gyro_L2/
# Accel_M/Gyro_M), transformer encoder with a sequence-level TCN head.
#
# Requires preprocessing into the matching dir first:
#   python main.py run.preprocess=true run.pretrain=false run.train=false run.eval=false \
#     dataset.normalization=height_minmax dataset.handcrafted_features=true \
#     dataset.processed_dir=data/processed/ENABL3S/100hz_height_feat10

version: "hminmax_feat10_tcnhead"

run:
  preprocess: true   # set false once data/processed/.../100hz_height_feat10 exists
  pretrain: false
  train: true
  eval: true
  # The bundled MAE checkpoint is 6-feature and incompatible with input_features=10.
  # Train from scratch here; to use MAE init, pretrain a 10-feature checkpoint first
  # (run.pretrain=true) and point run.checkpoint_path at it.
  load_checkpoint: false

training:
  epochs: 20
  early_stopping:
    # loss is in degrees² now (unnormalized target), so scale the absolute
    # improvement threshold up from the z-scored default (1e-4).
    min_delta: 0.05

# AdamW is ~scale-invariant, so lr is left unchanged; but the grad-clip threshold
# is in absolute gradient-norm units, which grew ~25× with the unnormalized target.
# Disable it (or raise to ~25–50) so it doesn't clip every step.
gpu:
  gradient:
    clip_grad_norm: null

dataset:
  normalization: height_minmax
  normalize_target: false
  handcrafted_features: true
  processed_dir: "data/processed/ENABL3S/100hz_height_feat10"

model:
  encoder:
    input_features: 10
    pooling: mean
    head_type: tcn
