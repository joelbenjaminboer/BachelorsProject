epochs: 50
freeze_encoder_epochs: 5  # phase 1: train head only; 0 to disable

early_stopping:
  patience: 15        # stop after this many epochs without improvement
  min_delta: 1.0e-4   # minimum change to count as improvement
batch_size: 256
num_workers: null   # null = auto: min(cpu_count, 8). Windows: override to 0 (shared-mem OOM)
persistent_workers: true
prefetch_factor: 4
pin_memory: auto
non_blocking_transfer: true
holdout_subjects: ["AB194"]
split_seed: 42

# Used only when dataset.split_strategy=per_subject: each subject's trials are
# shuffled (split_seed) and cut trial-wise into these fractions.
per_subject_train_ratio: 0.7
per_subject_val_ratio: 0.1
per_subject_test_ratio: 0.2
context_length: 274
forecast_horizon: 137

mask_ratio: 0.5    # fractional target (0.0 = use absolute mask_block_min/max_len)
mask_type: block   # block / random / mixed

augmentation:
  enabled: false
  jitter_sigma: 0.02
  scale_lo: 0.9
  scale_hi: 1.1
  time_warp_sigma: 0.05
  rotation_sigma: 0.1
  channel_drop_p: 0.1
