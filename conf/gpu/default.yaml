device: auto

deterministic: false
seed: 42

autocast:
  enabled: true
  dtype: auto

compile:
  enabled: true
  mode: reduce-overhead
  fullgraph: false
  dynamic: false
  backend: cudagraphs

parallel:
  strategy: auto

cuda:
  tf32: true
  cudnn_benchmark: true
  cudnn_deterministic: false
  allow_fused_adamw: true

gradient:
  accumulation_steps: 1
  clip_grad_norm: 1.0
