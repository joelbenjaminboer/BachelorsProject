device: auto

deterministic: false
seed: 42

autocast:
  enabled: true
  dtype: auto
  # GradScaler starting scale. Default torch value is 65536 (2^16), which on
  # fp16-only cards (Turing) can overshoot and produce inf/NaN in the first
  # steps. 1024 (2^10) starts conservative and ramps up as headroom allows.
  init_scale: 1024

compile:
  enabled: false
  mode: reduce-overhead
  fullgraph: false
  dynamic: false
  backend: cudagraphs

parallel:
  strategy: auto

cuda:
  tf32: true
  cudnn_benchmark: true
  cudnn_deterministic: false
  allow_fused_adamw: true

gradient:
  accumulation_steps: 1
  clip_grad_norm: 1.0
