model_type: timesnet
supports_pretrain: false

timesnet:
  input_features: 6
  d_model: 64
  num_blocks: 2
  top_k: 3
  d_ff: 128
  num_kernels: 2
  dropout: 0.2

optimizer:
  name: adamw
  lr: 1.0e-3
  weight_decay: 1.0e-3
  betas: [0.9, 0.999]
  eps: 1.0e-8

loss:
  name: smooth_l1
  reduction: mean

scheduler:
  name: reduce_on_plateau
  factor: 0.5
  patience: 5
  min_lr: 1.0e-6
