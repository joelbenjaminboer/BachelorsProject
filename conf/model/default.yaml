encoder:
  input_features: 6
  d_model: 256
  num_heads: 4
  num_layers: 3
  dim_feedforward: 1024
  positional_encoding_extra_tokens: 1
  positional_encoding_max_len: null
  positional_encoding_base: 10000.0

optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]
  eps: 1.0e-8

loss:
  name: mse
  reduction: mean
