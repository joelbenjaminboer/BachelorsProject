model_type: encoder
supports_pretrain: true

encoder:
  input_features: 6
  d_model: 256
  num_heads: 4
  num_layers: 10
  dim_feedforward: 1024
  dropout: 0.27091993923871843
  head_dropout: 0.006339032659033517
  positional_encoding_extra_tokens: 1
  positional_encoding_max_len: null
  positional_encoding_base: 10000.0
  pooling: cls       # cls / mean / last_25
  patch_size: 25     # null / 8 / 16 / 25
  head_type: tcn  # linear / tcn
  tcn_head:
    num_blocks: 1
    kernel_size: 3

optimizer:
  name: adamw
  lr: 2.0e-4
  weight_decay: 0.0029106271159050775
  betas: [0.9, 0.999]
  eps: 1.0e-8

loss:
  name: mse        # standardised across encoder/tcn/timesnet for a fair comparison
  reduction: mean

scheduler:
  name: cosine_warmup
  warmup_epochs: 5  # linear ramp from 1% → 100% of lr
  min_lr: 1.0e-6

multitask:
  enabled: false
  velocity_loss_weight: 0.5347985810422528