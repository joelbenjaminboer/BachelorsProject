model_type: encoder
supports_pretrain: true

encoder:
  input_features: 6
  d_model: 256
  num_heads: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  positional_encoding_extra_tokens: 1
  positional_encoding_max_len: null
  positional_encoding_base: 10000.0
  pooling: cls       # cls / mean / last_25
  patch_size: null   # null / 8 / 16 / 25

optimizer:
  name: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]
  eps: 1.0e-8

loss:
  name: huber
  reduction: mean
  delta: 1.0  # transition point from quadratic to linear (in normalised target units)

scheduler:
  name: cosine_warmup
  warmup_epochs: 5  # linear ramp from 1% → 100% of lr
  min_lr: 1.0e-6

multitask:
  enabled: false
  velocity_loss_weight: 0.1
