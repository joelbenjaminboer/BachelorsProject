model_type: encoder
supports_pretrain: true

encoder:
  input_features: 6
  d_model: 256
  num_heads: 16
  num_layers: 7
  dim_feedforward: 1024
  dropout: 0.32551973887117647
  head_dropout: 0.09502528223948842
  positional_encoding_extra_tokens: 1
  positional_encoding_max_len: null
  positional_encoding_base: 10000.0
  pooling: cls       # cls / mean / last_25
  patch_size: 25     # null / 8 / 16 / 25

optimizer:
  name: adamw
  lr: 0.004489987139101679
  weight_decay: 0.001076103698025301
  betas: [0.9, 0.999]
  eps: 1.0e-8

loss:
  name: huber
  reduction: mean
  delta:  0.10029422967780466  # transition point from quadratic to linear (in normalised target units)

scheduler:
  name: cosine_warmup
  warmup_epochs: 5  # linear ramp from 1% → 100% of lr
  min_lr: 1.0e-6

multitask:
  enabled: true
  velocity_loss_weight: 0.5347985810422528