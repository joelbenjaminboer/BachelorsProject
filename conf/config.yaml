dataset:
  url: "https://figshare.com/ndownloader/articles/5362627/versions/3"
  raw_data_dir: "data/raw"
  output_zip: "data/raw/ENABL3S.zip"
  extract_dir: "data/raw/ENABL3S"
  processed_dir: "data/processed/ENABL3S"

training:
  active_model: "timesfm"
  epochs: 50
  batch_size: 128
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  split_ratio: 0.9  # 90/10 train/val split
  context_length: 25
  forecast_horizon: 10

models:
  chronos2:
    model_id: "amazon/chronos-t5-small"
  timesfm:
    model_id: "google/timesfm-2.0-500m-pytorch"
